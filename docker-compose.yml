services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: file:/app/data/images.db
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 52428800
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then(r=>r.json()).then(d=>process.exit(d.db==='ok'?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads:
  data:
